services:
  - type: web
    name: smartdoc-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: CHROMA_PERSIST_DIR
        value: /data/chroma
      - key: UPLOAD_DIR
        value: /data/uploads
